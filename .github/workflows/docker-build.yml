name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'chatapp-backend/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create Firebase Service Account JSON
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_KEY" > ./chatapp-backend/firebase-service-account.json

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./chatapp-backend
          push: true
          tags: tharunrajr/chatapp-backend:latest
