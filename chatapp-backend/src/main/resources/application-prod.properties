# =============================================
# ChatApp Backend - Production Configuration
# =============================================

# ---- Database (from Docker env vars) ----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# ---- Redis ----
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-ms=${JWT_EXPIRY_MS:86400000}
app.jwt.refresh-expiry-ms=${JWT_REFRESH_EXPIRY_MS:604800000}

# ---- Firebase ----
app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH}

# ---- Media ----
app.media.path=${MEDIA_PATH}

# ---- JPA (no DDL in production - init.sql handles it) ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ---- Logging ----
logging.level.com.chatapp=INFO
logging.level.org.springframework.security=WARN
