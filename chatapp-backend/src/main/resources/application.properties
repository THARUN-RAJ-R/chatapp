# =============================================
# ChatApp Backend - Base Configuration
# =============================================

spring.application.name=chatapp-backend

# ---- Database (overridden in prod profile) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/chatapp
spring.datasource.username=chatapp
spring.datasource.password=chatapp@2026
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Redis ----
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---- JWT ----
app.jwt.secret=chatapp-super-secret-key-change-this-in-production-must-be-256-bits-long
app.jwt.expiry-ms=86400000
app.jwt.refresh-expiry-ms=604800000

# ---- Firebase ----
app.firebase.credentials-path=firebase-service-account.json

# ---- Media ----
app.media.path=media
app.media.max-size-mb=10

# ---- File upload size ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Server ----
server.port=8080

# ---- Logging ----
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.security=INFO
